<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Inventory | Work in Progress</title>
    <meta name="description" content="Mind Inventory. Structuring chaos into brilliance. Coming soon.">

    <!-- Google Fonts: Futuristic & Monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #e2e2e2;
            --text-dim: #6b7280;
            --accent: #00ff9d; /* Tech Green */
            --accent-dim: rgba(0, 255, 157, 0.1);
            --grid-line: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Grid Background --- */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* --- Main Layout --- */
        .wrapper {
            width: 90%;
            max-width: 700px;
            padding: 40px;
            position: relative;
            z-index: 10;
            border: 1px solid var(--grid-line);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(5px);
        }

        /* Decorative corners for the card */
        .wrapper::before, .wrapper::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 2px solid var(--accent);
            transition: all 0.5s ease;
        }
        .wrapper::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .wrapper::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* --- Typography --- */
        .status-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 6px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        .blink {
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 90%;
            margin-bottom: 3rem;
        }

        /* --- Loading Bar --- */
        .loader-container {
            width: 100%;
            margin-bottom: 3rem;
        }
        
        .loader-label {
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 4px;
            width: 100%;
            background: #222;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            box-shadow: 0 0 10px var(--accent);
            animation: loadProgress 2s ease-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 75%; }
        }

        /* --- Email Form --- */
        .input-group {
            display: flex;
            border-bottom: 1px solid #333;
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-bottom: 1px solid var(--accent);
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 15px 0;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        button {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            padding: 0 20px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.7;
        }

        /* --- Footer --- */
        .meta {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #333;
            pointer-events: none;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .wrapper { width: 95%; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="wrapper">
        <div class="status-badge">
            <span class="blink">●</span> System Initialization
        </div>

        <h1>Structuring chaos<br>into brilliance.</h1>

        <p>
            // We are building a digital ecosystem to catalog, analyze, and deploy your intellectual assets. 
            <br><br>
            Mind Inventory is currently under heavy development.
        </p>

        <div class="loader-container">
            <div class="loader-label">
                <span>Deploying Framework</span>
                <span>75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <form onsubmit="event.preventDefault(); alert('Request logged. We will contact you soon.');">
            <div class="input-group">
                <input type="email" placeholder="Enter access credentials (email)..." required>
                <button type="submit">Request Access</button>
            </div>
        </form>
    </div>

    <div class="meta">
        MIND_INVENTORY_WORK_V.1.0 // EST. <script>document.write(new Date().getFullYear())</script>
    </div>

</body>
</html>
